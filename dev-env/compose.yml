name: "bassvids"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  envlinks:
    image: maxhollmann/envlinks:v0.3
    ports:
      - 9999:5000
    environment:
      LINKS_TITLE: BassVids [DEV]

      LINK_00_Frontend: http://localhost:3000 icon:home
